name: Go Build and Compress

on:
  push:
    branches: [ "main" ]
    paths:
      - 'go/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'go/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Build Binary
        run: |
          go build -ldflags="-s -w" -o tgbot .

      - name: Compress with UPX
        run: |
          upx --best --lzma tgbot

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compressed-binary
          path: go/tgbot